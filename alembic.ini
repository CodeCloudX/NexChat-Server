# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to render date/time in revision files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the revision file
# leaving it blank implies the currently set local timezone.
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created
# with logging configuration
# sourceless = false

# version location specification; This defaults
# to migrations/versions.  When using multiple version
# directories, initial revs will be installed in the
# directory listed first. In this case, use "alembic revision"
# with the --version-path option to specify a target directory.
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# version path separator; as above, used to separate multiple version directories;
# defaults to os.pathsep, which is ';' on Windows and ':' on Unix
# version_path_separator = ;

# set to 'true' to search source files recursively
# in each "version_locations" directory
# recursive_version_locations = false

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

# We leave this as a placeholder. The actual URL is injected
# dynamically in migrations/env.py from the .env file.
sqlalchemy.url = postgresql://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks allows scripts to be run after generating a revision file.
# See the documentation for details.

[logging]
default_handler_name = console

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
